{% load static %}

					<div class="card bg-transparent card-body p-0">
						<div class="row d-flex justify-content-between">
							<!-- Avatar -->
							<div class="col-auto mt-4 mt-md-0">
								<div class="avatar avatar-xxl mt-n3">
									<img class="avatar-img rounded-circle border border-white border-3 shadow" src="{{ instructor.user.avatar.url }}" alt="{{ instructor.user.username }}">
								</div>
							</div>
							<!-- Profile info -->
							<div class="col d-md-flex justify-content-between align-items-center mt-4">
								<div>
									<h1 class="my-1 fs-4">{{ instructor.user.first_name }} {{ instructor.user.last_name }}
										<i class="bi bi-patch-check-fill text-info small"></i></h1>
									<ul class="list-inline mb-0">
										<li class="list-inline-item h6 fw-light me-3 mb-1 mb-sm-0"><i class="fas fa-star text-warning me-2"></i>{{ instructor.instructor_avg_score }}/5.0</li>
										<li class="list-inline-item h6 fw-light me-3 mb-1 mb-sm-0"><i class="fas fa-user-graduate text-orange me-2"></i>{{ students_count }} تعداد کل دانشجویان </li>
										<li class="list-inline-item h6 fw-light me-3 mb-1 mb-sm-0"><i class="fas fa-book text-purple me-2"></i>{{ total_courses }} تعداد کل دوره ها </li>
									</ul>
								</div>
								<!-- Button -->
								<div class="d-flex align-items-center mt-2 mt-md-0">
									<a href="{% url 'instructor:create_course' %}" class="btn btn-success mb-0">ایجاد دوره</a>
								</div>
							</div>
						</div>
					</div>
