{% load static %}

	<!-- =======================Page Banner START -->
	<section class="pt-0">
		<div class="container-fluid px-0">
			<div class="card bg-blue h-100px h-md-200px rounded-0" style="background:url({% static 'images/pattern/04.png' %}) no-repeat center center; background-size:cover;">
			</div>
		</div>

		<div class="container mt-n4">
			<div class="row">
				<div class="col-12">
					<div class="card bg-transparent card-body pb-0 px-0 mt-2 mt-sm-0">
						<div class="row d-sm-flex justify-sm-content-between mt-2 mt-md-0">

							<!-- Avatar -->
							<div class="col-auto">
								<div class="avatar avatar-xxl position-relative mt-n3">
									<img class="avatar-img rounded-circle border border-white border-3 shadow"
										src="{% static 'images/avatar/09.jpg' %}"
										alt="تصویر پروفایل کاربر">
								</div>
							</div>

							<!-- Profile info -->
							<div class="col d-sm-flex justify-content-between align-items-center">
								<div>
									<h1 class="my-1 fs-4">{{ request.user.username }}</h1>

									<ul class="list-inline mb-0">
										<li class="list-inline-item me-3 mb-1 mb-sm-0">
											<span class="h6">{{ total_scores|default:0 }}</span>
											<span class="text-body fw-light">امتیاز</span>
										</li>

										<li class="list-inline-item me-3 mb-1 mb-sm-0">
											<span class="h6">{{ completed_courses|default:0 }}</span>
											<span class="text-body fw-light">دوره تکمیل‌شده</span>
										</li>

										<li class="list-inline-item me-3 mb-1 mb-sm-0">
											<span class="h6">{{ total_completed_lessons|default:0 }}</span>
											<span class="text-body fw-light">درس تکمیل‌شده</span>
										</li>
									</ul>
								</div>

								<!-- Button -->
								<div class="mt-2 mt-sm-0">
									<a href="{% url 'course:student_courses' %}" class="btn btn-outline-primary mb-0">مشاهده دوره‌های من</a>
								</div>
							</div>

						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
	<!-- =======================Page Banner END -->
