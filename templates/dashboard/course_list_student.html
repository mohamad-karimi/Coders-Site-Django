{% load static %}		
                        
                        <div class="card bg-transparent border rounded-3">
							<!-- Card header START -->
							<div class="card-header bg-transparent border-bottom">
								<h3 class="mb-0">لیست دوره‌های من</h3>
							</div>
							<!-- Card header END -->

							<!-- Card body START -->
							<div class="card-body">

								<!-- Search and select START -->
								<div class="row g-3 align-items-center justify-content-between mb-4">
									<div class="col-md-3">
										<form>
											<select class="form-select js-choice border-0 z-index-9 bg-transparent"
												aria-label=".form-select-sm">
												<option value="">مرتب‌سازی</option>
												<option>رایگان</option>
												<option>جدیدترین</option>
												<option>محبوب‌ترین</option>
												<option>پربازدیدترین</option>
											</select>
										</form>
									</div>
								</div>
								<!-- Search and select END -->

								<!-- Course list table START -->
								<div class="table-responsive border-0">
									<table class="table table-dark-gray align-middle p-4 mb-0 table-hover">
										<thead>
											<tr>
												<th scope="col" class="border-0 rounded-start">عنوان دوره</th>
												<th scope="col" class="border-0">تعداد کل جلسات</th>
												<th scope="col" class="border-0">جلسات تکمیل‌شده</th>
												<th scope="col" class="border-0 rounded-end">عملیات</th>
											</tr>
										</thead>

										<tbody>
											{% for course in courses %}
											<tr>
												<td>
													<div class="d-flex align-items-center">
														<div class="w-100px">
															<img src="{{ course.image.url }}" class="rounded"
																alt="">
														</div>
														<div class="mb-0 ms-2">
															<h6><a href="{% url 'course:course_detail' course.slug %}">{{ course.title}}</a></h6>
															<div class="overflow-hidden">
																<h6 class="mb-0 text-end">85%</h6>
																<div
																	class="progress progress-sm bg-primary bg-opacity-10">
																	<div class="progress-bar bg-primary aos"
																		role="progressbar" style="width: 85%"></div>
																</div>
															</div>
														</div>
													</div>
												</td>
												<td>56</td>
												<td>40</td>
												<td>
													<a href="#" class="btn btn-sm btn-primary-soft me-1 mb-1 mb-md-0">
														<i class="bi bi-play-circle me-1"></i>ادامه
													</a>
												</td>
											</tr>
											{% endfor %}
										</tbody>
									</table>
								</div>
								<!-- Course list table END -->

								<!-- Pagination START -->
								<div class="d-sm-flex justify-content-sm-between align-items-sm-center mt-4 mt-sm-3">
									<p class="mb-0 text-center text-sm-start">نمایش 1 تا 8 از 20 مورد</p>

									<nav class="d-flex justify-content-center mb-0">
										<ul
											class="pagination pagination-sm pagination-primary-soft d-inline-block d-md-flex rounded mb-0">
											<li class="page-item mb-0"><a class="page-link" href="#"><i
														class="fas fa-angle-left"></i></a></li>
											<li class="page-item mb-0"><a class="page-link" href="#">1</a></li>
											<li class="page-item mb-0 active"><a class="page-link" href="#">2</a></li>
											<li class="page-item mb-0"><a class="page-link" href="#">3</a></li>
											<li class="page-item mb-0"><a class="page-link" href="#"><i
														class="fas fa-angle-right"></i></a></li>
										</ul>
									</nav>
								</div>
								<!-- Pagination END -->

							</div>
						</div>
